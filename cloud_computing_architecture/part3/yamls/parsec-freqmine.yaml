apiVersion: batch/v1
kind: Job
metadata:
  name: parsec-freqmine
  labels:
    name: parsec-freqmine
spec:
  template:
    spec:
      containers:
      - image: anakli/cca:parsec_freqmine
        name: parsec-freqmine
        imagePullPolicy: Always
        command: ["/bin/sh"]
        args: ["-c", "taskset -c ${JOB_CORES} ./run -a run -S parsec -p freqmine -i native -n ${JOB_CORES_N}"]
      restartPolicy: Never
      nodeSelector:
        cca-project-nodetype: "${JOB_NODE}"
